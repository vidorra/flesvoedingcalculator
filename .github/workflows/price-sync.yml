name: Nachtelijke prijssync

on:
  schedule:
    # 03:47 UTC = 04:47/05:47 NL; bewust offset t.o.v. togwaarde
    - cron: '47 3 * * *'
  workflow_dispatch: {}

jobs:
  sync-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger prijssync op flesvoedingcalculator.nl
        run: |
          curl -fsS -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --max-time 600 \
            https://flesvoedingcalculator.nl/api/cron/sync-prices | tee result.json
          # Faal de job als de API zelf een fout meldt
          grep -q '"success":true' result.json
